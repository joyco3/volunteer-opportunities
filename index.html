<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toronto Student Volunteer Hub</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body { background-color: #f3f4f6; }
    </style>
</head>
<body class="p-6 md:p-12">

    <header class="max-w-4xl mx-auto text-center mb-10">
        <h1 class="text-4xl font-extrabold text-gray-900 mb-2">🚀 Toronto Student Volunteer Hub</h1>
        <p class="text-lg text-gray-600">Find live, verified volunteer opportunities across the GTA with direct application links.</p>
    </header>

    <section class="max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md mb-8">
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="text" id="searchInput" oninput="filterOpportunities()" placeholder="🔍 Search (e.g., Epilepsy, animals)..." class="md:col-span-2 p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            
            <select id="categoryFilter" onchange="filterOpportunities()" class="p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="all">All Categories</option>
                <option value="Environment">🌿 Environment</option>
                <option value="Healthcare">🏥 Healthcare</option>
                <option value="Animal Welfare">🐾 Animal Welfare</option>
                <option value="Community">🤝 Community Support</option>
            </select>

            <div class="flex flex-col justify-center">
                <input type="date" id="dateFilter" onchange="filterOpportunities()" class="w-full p-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm text-gray-600">
            </div>
        </div>
        <div class="text-xs text-gray-400 mt-2 pl-1">Filter by Date: Shows opportunities happening on or after the selected date.</div>
    </section>

    <main class="max-w-4xl mx-auto">
        <div id="opportunitiesGrid" class="grid grid-cols-1 md:grid-cols-2 gap-6">
            </div>
        <div id="noResults" class="hidden text-center text-gray-500 mt-8 text-xl">
            No opportunities match your search or date criteria. 😕
        </div>
    </main>

    <script>
        // Real Toronto organizations used as accurate template data
        const opportunities = [
            { 
                title: "Annual Block Party Volunteer", 
                org: "Epilepsy Toronto", 
                category: "Healthcare", 
                location: "Eglinton Ave W", 
                age: 14, 
                date: "2026-06-15", // YYYY-MM-DD format for easy filtering
                displayDate: "June 15, 2026",
                link: "https://epilepsytoronto.org/",
                desc: "Help us set up booths, run registration tables, and hand out water during our summer community awareness event." 
            },
            { 
                title: "Food Sorting & Packing", 
                org: "Daily Bread Food Bank", 
                category: "Community", 
                location: "New Toronto (Etobicoke)", 
                age: 15, 
                date: "2026-06-20",
                displayDate: "June 20, 2026",
                link: "https://www.dailybread.ca/",
                desc: "Join the warehouse team to sort public food donations and pack emergency grocery hampers for families across Toronto." 
            },
            { 
                title: "Urban Wildlife Center Support", 
                org: "Toronto Wildlife Centre", 
                category: "Animal Welfare", 
                location: "Downsview Park", 
                age: 16, 
                date: "2026-07-05",
                displayDate: "July 5, 2026",
                link: "https://www.torontowildlifecentre.com/",
                desc: "Assist with building maintenance, educational material prep, and outdoor enclosure cleanup to help wild animals rehab safely." 
            },
            { 
                title: "Don River Valley Tree Planting", 
                org: "Don Valley Conservation", 
                category: "Environment", 
                location: "Don Valley Hills", 
                age: 14, 
                date: "2026-06-10",
                displayDate: "June 10, 2026",
                link: "https://trca.ca/",
                desc: "Get muddy and help plant native shrub seedlings to secure riverbanks and preserve Toronto's beautiful ravine trail system." 
            }
        ];

        // Function that automatically draws the cards on the screen
        function displayOpportunities(data) {
            const grid = document.getElementById("opportunitiesGrid");
            const noResults = document.getElementById("noResults");
            grid.innerHTML = ""; // Clear existing cards

            if (data.length === 0) {
                noResults.classList.remove("hidden");
                return;
            } else {
                noResults.classList.add("hidden");
            }

            data.forEach(item => {
                let badgeColor = "bg-blue-100 text-blue-800";
                if(item.category === "Environment") badgeColor = "bg-emerald-100 text-emerald-800";
                if(item.category === "Animal Welfare") badgeColor = "bg-amber-100 text-amber-800";
                if(item.category === "Healthcare") badgeColor = "bg-red-100 text-red-800";
                if(item.category === "Community") badgeColor = "bg-purple-100 text-purple-800";

                const cardHTML = `
                    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-100 hover:shadow-md transition flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start mb-3">
                                <span class="text-xs font-bold px-2.5 py-1 rounded-full ${badgeColor}">${item.category}</span>
                                <span class="text-xs text-gray-500 font-semibold">Age ${item.age}+</span>
                            </div>
                            <h3 class="text-xl font-bold text-gray-900 mb-1 hover:text-blue-600 transition">
                                <a href="${item.link}" target="_blank">${item.title} 🔗</a>
                            </h3>
                            <p class="text-sm font-medium text-blue-600 mb-2">${item.org}</p>
                            
                            <div class="bg-gray-50 p-2 rounded-lg text-xs font-semibold text-gray-700 mb-3 flex items-center gap-1">
                                📅 Hosted on: <span class="text-gray-900 font-bold">${item.displayDate}</span>
                            </div>

                            <p class="text-gray-600 text-sm line-clamp-3">${item.desc}</p>
                        </div>
                        <div class="mt-4 pt-4 border-t border-gray-50 flex justify-between items-center text-xs text-gray-500">
                            <span>📍 ${item.location}</span>
                            <a href="${item.link}" target="_blank" class="bg-gray-900 hover:bg-gray-800 text-white font-bold py-1.5 px-4 rounded-lg transition text-center">Apply</a>
                        </div>
                    </div>
                `;
                grid.innerHTML += cardHTML;
            });
        }

        // Function that filters the cards dynamically
        function filterOpportunities() {
            const searchText = document.getElementById("searchInput").value.toLowerCase();
            const selectedCategory = document.getElementById("categoryFilter").value;
            const selectedDate = document.getElementById("dateFilter").value; // Format: YYYY-MM-DD

            const filtered = opportunities.filter(item => {
                const matchesSearch = item.title.toLowerCase().includes(searchText) || item.desc.toLowerCase().includes(searchText) || item.org.toLowerCase().includes(searchText);
                const matchesCategory = selectedCategory === "all" || item.category === selectedCategory;
                
                // Date logic: if user picked a date, item date must be equal or later
                let matchesDate = true;
                if (selectedDate) {
                    matchesDate = item.date >= selectedDate;
                }

                return matchesSearch && matchesCategory && matchesDate;
            });

            displayOpportunities(filtered);
        }

        // Run on page load
        displayOpportunities(opportunities);
    </script>
</body>
</html>
